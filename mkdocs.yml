site_name: LLM-Rosetta
site_description: 大语言模型罗塞塔石 - LLM 提供商之间的统一消息格式转换库
site_author: Peng Ding
site_url: https://llm-rosetta.readthedocs.io/zh/
repo_name: Oaklight/llm-rosetta
repo_url: https://github.com/Oaklight/llm-rosetta
copyright: Copyright &copy; 2024 Peng Ding

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 切换到浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 跟随系统偏好
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/llm-rosetta
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/llm-rosetta/
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: 中文
      link: /zh/
      lang: zh

nav:
  - 首页: index.md
  - 快速上手:
      - 安装: getting-started/installation.md
      - 快速开始: getting-started/quickstart.md
  - 指南:
      - 核心概念: guide/concepts.md
      - 使用转换器: guide/converters.md
      - IR 类型: guide/ir-types.md
      - 流式处理: guide/streaming.md
      - 自动检测: guide/auto-detection.md
  - 网关:
      - gateway/index.md
  - 示例:
      - examples/index.md
      - 跨提供商对话: examples/cross-provider.md
      - 工具调用: examples/tool-calling.md
  - API 参考:
      - api/index.md
      - 转换器: api/converters.md
      - IR 类型: api/types.md
      - 工具函数: api/utils.md
  - 更新日志: changelog.md
