site_name: LLM-Rosetta
site_description: LLM-Rosetta - Unified message format conversion for LLM providers
site_author: Peng Ding
site_url: https://llm-rosetta.readthedocs.io/en/
repo_name: Oaklight/llm-rosetta
repo_url: https://github.com/Oaklight/llm-rosetta
copyright: Copyright &copy; 2024 Peng Ding

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/llm-rosetta
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/llm-rosetta/
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: 中文
      link: /zh-cn/
      lang: zh

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Guide:
      - Core Concepts: guide/concepts.md
      - Using Converters: guide/converters.md
      - IR Types: guide/ir-types.md
      - Streaming: guide/streaming.md
      - Auto Detection: guide/auto-detection.md
      - API Layers: guide/api-layers.md
      - Reasoning / Thinking: guide/reasoning.md
      - Provider Compatibility: guide/compatibility.md
  - Gateway:
      - gateway/index.md
      - Admin Panel: gateway/admin-panel.md
      - Validation: gateway/validation.md
      - CLI Cross-Format Testing: gateway/validation-cli.md
      - SDK & Integration Tests: gateway/validation-sdk.md
  - Examples:
      - examples/index.md
      - Cross-Provider Conversation: examples/cross-provider.md
      - Tool Calling: examples/tool-calling.md
  - API Reference:
      - api/index.md
      - Converters: api/converters.md
      - IR Types: api/types.md
      - Utilities: api/utils.md
  - Roadmap: roadmap.md
  - Changelog: changelog.md
